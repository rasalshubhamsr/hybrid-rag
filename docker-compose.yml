version: "3.9"

services:
  api:
    build: .
    container_name: hybrid-rag-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - QDRANT_HOST=qdrant
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
    depends_on:
      - qdrant
      - mysql
      - redis
    volumes:
      - ./app:/app/app
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: hybrid-rag-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: hybrid-rag-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: ragdb
      MYSQL_USER: raguser
      MYSQL_PASSWORD: ragpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    container_name: hybrid-rag-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  qdrant_data:
  mysql_data:
  redis_data:
